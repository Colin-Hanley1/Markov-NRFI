name: NRFI Predictions

on:
  schedule:
    - cron: '0 * * * *'  # every hour
  workflow_dispatch:

jobs:
  compute:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: nrfi_model
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: nrfi_model/requirements.txt

      - name: Install dependencies
        run: pip install numpy pandas scipy requests

      - name: Update player profiles (twice daily)
        if: contains(fromJSON('["13","20"]'), github.event.schedule && format('{0}', github.event.schedule) || '13')
        run: python update_profiles.py
        continue-on-error: true

      - name: Compute today's predictions
        run: python compute_daily.py

      - name: Check resolved game results
        run: python check_results.py

      - name: Sync docs to repo root
        working-directory: .
        run: |
          cp nrfi_model/docs/index.html docs/index.html
          cp nrfi_model/docs/data/* docs/data/

      - name: Commit and push
        working-directory: .
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/ nrfi_model/docs/data/ nrfi_model/data/pitchers.csv nrfi_model/data/batters.csv nrfi_model/data/league_averages.csv
          git diff --staged --quiet || git commit -m "Update $(date +%Y-%m-%d\ %H:%M\ UTC)"
          git push
