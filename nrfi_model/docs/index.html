<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The NRFI Observer — Markovian Inning Model</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght,SOFT@9..144,300..900,100&family=IBM+Plex+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16/dist/katex.min.css">
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16/dist/katex.min.js"></script>

  <style>
    :root {
      --paper: #f4ede1;
      --paper-dark: #ebe1cf;
      --paper-darker: #ded2ba;
      --ink: #1a1814;
      --ink-soft: #3a342a;
      --muted: #8a8476;
      --rule: #cfc3a9;
      --accent: #c3392b;     /* vintage red */
      --accent-dark: #9a2a1e;
      --navy: #2d3f5f;
      --moss: #6b7a3d;
      --gold: #b8941f;

      --serif: 'Fraunces', Georgia, serif;
      --sans: 'IBM Plex Sans', -apple-system, sans-serif;
      --mono: 'JetBrains Mono', ui-monospace, monospace;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      background: var(--paper);
      color: var(--ink);
      font-family: var(--sans);
      font-size: 15px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    /* Paper texture — subtle grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1;
      opacity: 0.35;
      background-image:
        radial-gradient(circle at 20% 30%, rgba(139, 115, 85, 0.04) 0%, transparent 50%),
        radial-gradient(circle at 80% 70%, rgba(139, 115, 85, 0.04) 0%, transparent 50%),
        url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.12'/%3E%3C/svg%3E");
    }

    main { position: relative; z-index: 2; }

    .tabular { font-variant-numeric: tabular-nums; font-feature-settings: 'tnum'; }
    .mono { font-family: var(--mono); }
    .small-caps { text-transform: uppercase; letter-spacing: 0.12em; font-size: 0.72em; font-weight: 600; }

    /* ═══ MASTHEAD ═══ */
    .masthead {
      border-bottom: 3px double var(--ink);
      padding: 32px 48px 20px;
      max-width: 1380px;
      margin: 0 auto;
    }

    .masthead-top {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--ink-soft);
      border-bottom: 1px solid var(--rule);
      padding-bottom: 10px;
      margin-bottom: 18px;
      font-weight: 500;
    }

    .masthead-top span:nth-child(2) { color: var(--accent); font-weight: 600; }

    .masthead h1 {
      font-family: var(--serif);
      font-size: clamp(48px, 7vw, 88px);
      font-weight: 300;
      font-variation-settings: 'opsz' 144, 'SOFT' 50;
      line-height: 0.92;
      letter-spacing: -0.035em;
      font-style: italic;
      text-align: center;
      color: var(--ink);
    }

    .masthead h1 .the {
      font-size: 0.45em;
      font-style: normal;
      font-weight: 400;
      vertical-align: 0.8em;
      letter-spacing: 0.04em;
      margin-right: 0.15em;
      color: var(--accent);
    }

    .masthead h1 strong {
      font-weight: 900;
      font-style: normal;
    }

    .masthead-sub {
      text-align: center;
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid var(--rule);
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 24px;
      font-size: 11px;
      color: var(--ink-soft);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      font-weight: 500;
      flex-wrap: wrap;
    }

    .masthead-sub .ornament { color: var(--accent); font-size: 14px; }

    /* ═══ TABS ═══ */
    .tabs {
      max-width: 1380px;
      margin: 0 auto;
      padding: 14px 48px 0;
      display: flex;
      gap: 32px;
      border-bottom: 1px solid var(--rule);
    }

    .tab-btn {
      background: none;
      border: none;
      padding: 12px 0;
      font-family: var(--sans);
      font-size: 12px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 500;
      cursor: pointer;
      position: relative;
      transition: color 0.2s;
    }

    .tab-btn:hover { color: var(--ink); }

    .tab-btn.active {
      color: var(--accent);
      font-weight: 700;
    }

    .tab-btn.active::after {
      content: '';
      position: absolute;
      left: 0;
      right: 0;
      bottom: -1px;
      height: 3px;
      background: var(--accent);
    }

    /* ═══ CONTAINER ═══ */
    .container {
      max-width: 1380px;
      margin: 0 auto;
      padding: 40px 48px 80px;
    }

    .tab-content { display: none; }
    .tab-content.active { display: block; }

    .section-head {
      font-family: var(--serif);
      font-weight: 400;
      font-style: italic;
      font-variation-settings: 'opsz' 144;
      font-size: 32px;
      letter-spacing: -0.02em;
      margin-bottom: 6px;
      color: var(--ink);
    }

    .section-sub {
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      font-weight: 500;
      margin-bottom: 24px;
      padding-bottom: 14px;
      border-bottom: 1px solid var(--rule);
    }

    /* ═══ SUMMARY DASHBOARD ═══ */
    .summary-grid {
      display: grid;
      grid-template-columns: 1.5fr 1fr 1fr 1fr;
      gap: 0;
      border-top: 2px solid var(--ink);
      border-bottom: 2px solid var(--ink);
      margin-bottom: 36px;
    }

    .stat-cell {
      padding: 22px 24px;
      border-right: 1px solid var(--rule);
      position: relative;
    }

    .stat-cell:last-child { border-right: none; }

    .stat-cell.feature {
      background: var(--paper-dark);
      border-right: 1px solid var(--ink);
    }

    .stat-label {
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 600;
      margin-bottom: 10px;
    }

    .stat-value {
      font-family: var(--serif);
      font-variation-settings: 'opsz' 144;
      font-weight: 700;
      font-size: 52px;
      line-height: 0.9;
      letter-spacing: -0.03em;
      color: var(--ink);
      font-variant-numeric: tabular-nums;
    }

    .stat-cell.feature .stat-value {
      font-size: 68px;
      color: var(--accent);
      font-style: italic;
      font-weight: 500;
    }

    .stat-value .unit {
      font-size: 0.45em;
      font-weight: 400;
      color: var(--muted);
      margin-left: 4px;
    }

    .stat-sub {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--ink-soft);
      margin-top: 8px;
      font-variant-numeric: tabular-nums;
    }

    /* ═══ SLATE RANKING ═══ */
    .slate {
      margin-bottom: 48px;
    }

    .slate-list {
      display: flex;
      flex-direction: column;
      border-top: 1px solid var(--rule);
    }

    .slate-row {
      display: grid;
      grid-template-columns: 32px 140px 1fr 64px;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid var(--rule);
      cursor: pointer;
      gap: 16px;
      transition: background 0.2s;
    }

    .slate-row:hover { background: var(--paper-dark); }

    .slate-rank {
      font-family: var(--serif);
      font-variation-settings: 'opsz' 144;
      font-style: italic;
      font-weight: 400;
      font-size: 22px;
      color: var(--muted);
      text-align: center;
      font-variant-numeric: tabular-nums;
    }

    .slate-matchup {
      font-family: var(--sans);
      font-weight: 600;
      font-size: 14px;
      letter-spacing: 0.02em;
    }

    .slate-matchup .at {
      font-family: var(--serif);
      font-style: italic;
      font-weight: 300;
      color: var(--muted);
      margin: 0 4px;
    }

    .slate-bar {
      height: 10px;
      background: var(--paper-dark);
      position: relative;
      border: 1px solid var(--rule);
    }

    .slate-bar-fill {
      height: 100%;
      transition: width 0.6s ease;
    }

    .slate-value {
      font-family: var(--mono);
      font-size: 15px;
      font-weight: 700;
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    /* ═══ GAME CARDS — NEWSPAPER BRIEFS ═══ */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 2px;
      background: var(--rule);
      border: 1px solid var(--rule);
    }

    .game-card {
      background: var(--paper);
      padding: 22px 24px;
      cursor: pointer;
      transition: background 0.2s;
      position: relative;
    }

    .game-card:hover { background: var(--paper-dark); }

    .game-card.no-model { opacity: 0.55; cursor: default; }
    .game-card.no-model:hover { background: var(--paper); }

    .card-head {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 14px;
    }

    .card-badge {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 3px 8px;
      border: 1px solid currentColor;
      font-weight: 600;
    }

    .badge-ok { color: var(--moss); }
    .badge-proj { color: var(--navy); }
    .badge-no { color: var(--muted); }

    .card-nrfi {
      font-family: var(--serif);
      font-variation-settings: 'opsz' 144;
      font-weight: 700;
      font-size: 36px;
      line-height: 0.9;
      letter-spacing: -0.03em;
      font-variant-numeric: tabular-nums;
    }

    .card-nrfi.none { color: var(--muted); font-weight: 400; font-style: italic; }

    .card-teams {
      font-family: var(--serif);
      font-size: 28px;
      font-weight: 500;
      line-height: 1.05;
      letter-spacing: -0.02em;
      margin-bottom: 6px;
    }

    .card-teams .versus {
      font-style: italic;
      font-weight: 300;
      color: var(--muted);
      font-size: 0.75em;
      margin: 0 6px;
    }

    .card-names {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.05em;
      margin-bottom: 14px;
      font-variant: small-caps;
    }

    .card-pitchers {
      font-size: 11px;
      color: var(--ink-soft);
      border-top: 1px solid var(--rule);
      padding-top: 10px;
      display: flex;
      justify-content: space-between;
      gap: 10px;
    }

    .card-pitchers div {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .card-pitchers div:last-child { text-align: right; }

    .card-pitchers .sp-label {
      font-family: var(--mono);
      font-size: 9px;
      color: var(--muted);
      letter-spacing: 0.1em;
    }

    .card-halves {
      display: flex;
      justify-content: space-between;
      margin-top: 10px;
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .card-halves .hv {
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 700;
      color: var(--ink);
      display: block;
      margin-bottom: 2px;
    }

    /* ═══ OVERLAY — FEATURE ARTICLE ═══ */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(26, 24, 20, 0.75);
      z-index: 100;
      justify-content: center;
      align-items: flex-start;
      padding: 40px 20px;
      overflow-y: auto;
      backdrop-filter: blur(2px);
    }
    .overlay.open { display: flex; }

    .panel {
      background: var(--paper);
      width: 100%;
      max-width: 920px;
      padding: 48px 56px;
      position: relative;
      border: 1px solid var(--ink);
      box-shadow: 6px 6px 0 var(--ink);
    }

    .panel .close {
      position: absolute;
      top: 18px;
      right: 22px;
      background: none;
      border: 1px solid var(--ink);
      color: var(--ink);
      font-size: 20px;
      cursor: pointer;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--serif);
    }

    .panel .close:hover { background: var(--ink); color: var(--paper); }

    .detail-kicker {
      font-size: 10px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--accent);
      font-weight: 700;
      text-align: center;
      margin-bottom: 10px;
    }

    .detail-headline {
      font-family: var(--serif);
      font-variation-settings: 'opsz' 144;
      font-size: 54px;
      font-weight: 400;
      font-style: italic;
      line-height: 0.95;
      letter-spacing: -0.03em;
      text-align: center;
      margin-bottom: 8px;
    }

    .detail-headline strong { font-style: normal; font-weight: 700; }

    .detail-byline {
      text-align: center;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding-bottom: 20px;
      margin-bottom: 30px;
      border-bottom: 1px solid var(--rule);
    }

    .feature-stat {
      text-align: center;
      padding: 20px 0 28px;
      border-bottom: 3px double var(--ink);
      margin-bottom: 30px;
    }

    .feature-stat .fs-label {
      font-size: 10px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 700;
      margin-bottom: 10px;
    }

    .feature-stat .fs-value {
      font-family: var(--serif);
      font-variation-settings: 'opsz' 144;
      font-size: 128px;
      font-weight: 300;
      font-style: italic;
      line-height: 0.85;
      color: var(--accent);
      letter-spacing: -0.05em;
      font-variant-numeric: tabular-nums;
    }

    .feature-stat .fs-value .pct {
      font-size: 0.45em;
      vertical-align: 0.3em;
      font-style: normal;
      font-weight: 400;
    }

    .feature-stat .fs-ci {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--ink-soft);
      margin-top: 8px;
      font-variant-numeric: tabular-nums;
    }

    .half-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
      border: 1px solid var(--ink);
      margin-bottom: 32px;
    }

    .half-panel {
      padding: 22px 24px;
      border-right: 1px solid var(--ink);
    }

    .half-panel:last-child { border-right: none; }

    .half-panel .hp-label {
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 700;
      margin-bottom: 8px;
    }

    .half-panel .hp-value {
      font-family: var(--serif);
      font-variation-settings: 'opsz' 144;
      font-size: 48px;
      font-weight: 500;
      font-style: italic;
      line-height: 0.9;
      letter-spacing: -0.02em;
      margin-bottom: 6px;
      font-variant-numeric: tabular-nums;
    }

    .half-panel .hp-detail {
      font-size: 11px;
      color: var(--ink-soft);
      line-height: 1.5;
    }

    .half-panel .hp-detail .mono { font-size: 10px; color: var(--muted); }

    /* ═══ SECTIONS INSIDE OVERLAY ═══ */
    .detail-section {
      margin-top: 32px;
    }

    .detail-section-label {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
      font-weight: 700;
      padding-bottom: 6px;
      border-bottom: 2px solid var(--ink);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .detail-section-label::before {
      content: '§';
      font-family: var(--serif);
      font-style: italic;
      font-size: 18px;
      color: var(--accent);
    }

    .chart-duo {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .chart-box {
      background: var(--paper);
      border: 1px solid var(--rule);
      padding: 16px 18px;
    }

    .chart-box h4 {
      font-family: var(--serif);
      font-style: italic;
      font-weight: 500;
      font-size: 14px;
      color: var(--ink);
      margin-bottom: 10px;
    }

    .chart-box canvas {
      max-height: 200px;
    }

    /* ═══ HEATMAP ═══ */
    .heatmap-wrap {
      position: relative;
      width: 100%;
      display: flex;
      justify-content: center;
    }
    .heatmap-wrap canvas {
      max-width: 100%;
      height: auto;
      cursor: crosshair;
    }
    .heatmap-tip {
      position: absolute;
      pointer-events: none;
      background: var(--ink);
      color: var(--paper);
      padding: 4px 10px;
      font-family: var(--mono);
      font-size: 10px;
      white-space: nowrap;
      opacity: 0;
      transition: opacity 0.15s;
      z-index: 10;
      border: 1px solid var(--accent);
    }
    .heatmap-tip.show { opacity: 1; }
    .heatmap-legend {
      display: flex;
      align-items: center;
      gap: 6px;
      justify-content: center;
      margin-top: 8px;
      font-family: var(--mono);
      font-size: 9px;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    .heatmap-gradient {
      width: 140px;
      height: 8px;
      background: linear-gradient(to right, var(--paper-darker), #e08a7c, var(--accent), var(--accent-dark));
      border: 1px solid var(--rule);
    }

    /* ═══ BATTER IMPACT BARS ═══ */
    .impact-bar {
      display: grid;
      grid-template-columns: 130px 1fr 56px;
      align-items: center;
      gap: 8px;
      padding: 4px 0;
      font-size: 11px;
    }

    .impact-name {
      color: var(--ink-soft);
      text-align: right;
      font-weight: 500;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .impact-name .sl {
      font-family: var(--mono);
      color: var(--muted);
      margin-right: 4px;
    }

    .impact-track {
      height: 14px;
      background: var(--paper-dark);
      position: relative;
      border: 1px solid var(--rule);
    }

    .impact-center {
      position: absolute;
      left: 50%;
      top: 0;
      bottom: 0;
      width: 1px;
      background: var(--ink);
    }

    .impact-fill {
      position: absolute;
      top: 0;
      height: 100%;
      transition: width 0.4s;
    }

    .impact-val {
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 700;
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    /* ═══ BASEBALL DIAMOND ═══ */
    .diamond-wrap {
      display: flex;
      align-items: flex-start;
      gap: 30px;
      justify-content: center;
      flex-wrap: wrap;
      padding: 8px;
    }

    .diamond-svg {
      width: 220px;
      height: 220px;
      flex-shrink: 0;
    }

    .diamond-info {
      display: flex;
      flex-direction: column;
      gap: 10px;
      min-width: 220px;
      max-width: 280px;
    }

    #dHalfLabel {
      font-family: var(--serif);
      font-style: italic;
      font-size: 18px !important;
      font-weight: 500 !important;
      color: var(--ink) !important;
    }

    .diamond-outs {
      display: flex;
      gap: 8px;
      align-items: center;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      font-weight: 600;
    }

    .out-dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      border: 2px solid var(--ink);
      transition: all 0.4s;
    }

    .out-dot.filled {
      background: var(--accent);
      border-color: var(--accent);
    }

    .diamond-pa {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--ink-soft);
    }

    .diamond-pa strong {
      font-weight: 700;
      color: var(--accent);
    }

    .diamond-event {
      font-family: var(--serif);
      font-style: italic;
      font-size: 15px;
      color: var(--ink);
      min-height: 44px;
      padding: 10px 0;
      border-top: 1px dashed var(--rule);
      line-height: 1.3;
    }
    .diamond-event strong {
      font-weight: 700;
      font-style: normal;
      color: var(--accent);
    }

    .diamond-result {
      font-family: var(--serif);
      font-size: 20px;
      font-weight: 700;
      font-style: italic;
      opacity: 0;
      transition: opacity 0.5s;
      padding: 6px 0;
    }

    .diamond-result.show { opacity: 1; }

    #dLog {
      font-family: var(--sans);
      font-size: 11px;
      color: var(--ink-soft);
      max-height: 160px;
      overflow-y: auto;
      line-height: 1.65;
      border-top: 1px dashed var(--rule);
      padding-top: 8px;
    }
    #dLog > * { display: block; padding: 1px 0; }

    .trace-btn {
      font-family: var(--mono);
      font-size: 10px;
      padding: 5px 10px;
      background: var(--paper);
      color: var(--ink-soft);
      border: 1px solid var(--rule);
      cursor: pointer;
      letter-spacing: 0.05em;
      font-weight: 600;
      transition: all 0.15s;
    }

    .trace-btn:hover { border-color: var(--ink); color: var(--ink); }
    .trace-btn.nrfi-trace { border-left: 3px solid var(--moss); }
    .trace-btn.rfi-trace { border-left: 3px solid var(--accent); }
    .trace-btn.active { background: var(--ink); color: var(--paper); border-color: var(--ink); }

    /* ═══ LINEUP TABLES ═══ */
    .lineup-cols {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
    }

    .lineup-col h4 {
      font-family: var(--serif);
      font-style: italic;
      font-weight: 500;
      font-size: 15px;
      margin-bottom: 8px;
      color: var(--ink);
    }

    table.lt {
      width: 100%;
      border-collapse: collapse;
      font-family: var(--mono);
      font-size: 10px;
      font-variant-numeric: tabular-nums;
    }

    table.lt th {
      text-align: left;
      color: var(--muted);
      font-weight: 600;
      padding: 6px 6px;
      border-bottom: 2px solid var(--ink);
      letter-spacing: 0.05em;
      text-transform: uppercase;
      font-size: 9px;
    }

    table.lt td {
      padding: 6px 6px;
      border-bottom: 1px solid var(--rule);
    }

    table.lt td:first-child {
      color: var(--muted);
      width: 16px;
    }

    table.lt td:nth-child(2) {
      font-family: var(--sans);
      font-size: 11px;
      font-weight: 500;
    }

    .park-strip {
      margin-top: 24px;
      padding: 14px 18px;
      background: var(--paper-dark);
      border: 1px solid var(--rule);
      font-family: var(--mono);
      font-size: 11px;
      display: flex;
      gap: 22px;
      flex-wrap: wrap;
      color: var(--ink-soft);
    }

    .park-strip strong { color: var(--ink); }

    /* ═══ METHODOLOGY ═══ */
    .method-section {
      max-width: 780px;
      margin: 0 auto;
    }

    .method-section h2 {
      font-family: var(--serif);
      font-size: 36px;
      font-weight: 500;
      font-style: italic;
      font-variation-settings: 'opsz' 144;
      letter-spacing: -0.02em;
      margin: 44px 0 16px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--rule);
    }

    .method-section h2:first-child { margin-top: 0; }

    .method-section p {
      font-size: 16px;
      line-height: 1.7;
      color: var(--ink-soft);
      margin-bottom: 16px;
      font-family: var(--sans);
    }

    .method-section p strong { color: var(--ink); font-weight: 600; }
    .method-section p code {
      font-family: var(--mono);
      font-size: 13px;
      background: var(--paper-dark);
      padding: 1px 6px;
      border: 1px solid var(--rule);
    }

    .method-section p:first-of-type::first-letter {
      font-family: var(--serif);
      font-size: 58px;
      font-weight: 700;
      float: left;
      line-height: 0.9;
      padding: 6px 8px 0 0;
      color: var(--accent);
      font-style: italic;
    }

    .formula {
      padding: 28px 24px;
      margin: 20px 0;
      background: var(--paper-dark);
      border-top: 2px solid var(--ink);
      border-bottom: 2px solid var(--ink);
      text-align: center;
      overflow-x: auto;
    }

    .formula .katex { color: var(--ink); font-size: 1.2em !important; }

    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      margin: 20px 0;
    }

    .grid-2 h3 {
      font-family: var(--serif);
      font-style: italic;
      font-size: 20px;
      font-weight: 500;
      margin-bottom: 6px;
      color: var(--accent);
    }

    .grid-2 p { font-size: 14px; margin-bottom: 0; }

    .state-diagram-wrap {
      margin: 24px 0;
      padding: 16px;
      background: var(--paper-dark);
      border: 1px solid var(--ink);
      position: relative;
    }
    .state-diagram-wrap svg {
      width: 100%;
      height: auto;
      display: block;
    }
    .state-diagram-legend {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--ink-soft);
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--rule);
      align-items: center;
    }
    .state-diagram-legend .ld {
      display: inline-block;
      width: 12px;
      height: 12px;
      margin-right: 6px;
      vertical-align: middle;
      border: 1px solid var(--ink);
    }
    .state-diagram-legend .outs-0 { background: #cfd8e6; }
    .state-diagram-legend .outs-1 { background: #f1d98a; }
    .state-diagram-legend .outs-2 { background: #e8a598; }
    .state-diagram-legend .absorb-nrfi { background: #9fb377; }
    .state-diagram-legend .absorb-rfi { background: #c3392b; }

    .state-node {
      cursor: pointer;
      transition: all 0.2s;
    }
    .state-node:hover rect { stroke-width: 2.5; }
    .state-node text { pointer-events: none; }
    .state-node .sid {
      font-family: 'Fraunces', serif;
      font-style: italic;
      font-weight: 700;
      font-size: 13px;
      fill: #1a1814;
    }
    .state-node .slbl {
      font-family: 'JetBrains Mono', monospace;
      font-size: 7px;
      fill: #3a342a;
    }

    /* ═══ RESULTS TRACKER ═══ */
    .tracker-section { margin-bottom: 40px; }

    .ledger-details summary {
      cursor: pointer;
      list-style: none;
      padding: 6px 0;
      border-bottom: 2px solid var(--ink);
      transition: opacity 0.15s;
    }
    .ledger-details summary::-webkit-details-marker { display: none; }
    .ledger-details summary:hover { opacity: 0.7; }
    .ledger-details summary h3 {
      margin: 0;
      border: none;
      padding: 0;
    }
    .ledger-details summary::before {
      content: '\25B8';
      display: inline-block;
      color: var(--accent);
      margin-right: 10px;
      transition: transform 0.2s;
      font-size: 12px;
    }
    .ledger-details[open] summary::before { transform: rotate(90deg); }

    .tracker-section h3 {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
      font-weight: 700;
      padding-bottom: 6px;
      border-bottom: 2px solid var(--ink);
      margin-bottom: 18px;
    }

    .results-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 0;
      border-top: 2px solid var(--ink);
      border-bottom: 2px solid var(--ink);
      margin-bottom: 24px;
    }

    .results-grid .stat-cell { padding: 18px 20px; }
    .results-grid .stat-cell .stat-value { font-size: 42px; }

    .daily-table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 24px;
      font-family: var(--sans);
    }

    .daily-table th {
      text-align: left;
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 700;
      padding: 10px 14px 8px;
      border-bottom: 2px solid var(--ink);
    }

    .daily-table td {
      padding: 11px 14px;
      border-bottom: 1px solid var(--rule);
      font-size: 13px;
      font-variant-numeric: tabular-nums;
    }

    .daily-table tr:hover td { background: var(--paper-dark); }

    .daily-table td.matchup {
      font-family: var(--serif);
      font-size: 14px;
      font-weight: 600;
    }

    .daily-table .pct-val {
      font-family: var(--mono);
      font-weight: 700;
    }

    .correct-tag {
      font-family: var(--mono);
      color: var(--moss);
      font-weight: 700;
      font-size: 10px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .miss-tag {
      font-family: var(--mono);
      color: var(--accent);
      font-weight: 700;
      font-size: 10px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .nrfi-tag, .rfi-tag {
      font-family: var(--mono);
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.1em;
      padding: 2px 6px;
      border: 1px solid currentColor;
    }

    .nrfi-tag { color: var(--moss); }
    .rfi-tag { color: var(--accent); }

    /* Color classes for P(NRFI) */
    .prob-high { color: var(--moss); }
    .prob-mid { color: var(--gold); }
    .prob-low { color: var(--accent); }
    .prob-vlow { color: var(--accent-dark); }

    /* ═══ EMPTY STATES ═══ */
    .empty {
      text-align: center;
      padding: 80px 20px;
      font-family: var(--serif);
      font-style: italic;
      color: var(--muted);
    }

    .empty h2 {
      font-size: 28px;
      color: var(--ink);
      margin-bottom: 8px;
      font-weight: 400;
    }

    .spinner {
      display: inline-block;
      width: 28px;
      height: 28px;
      border: 2px solid var(--rule);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ═══ RESPONSIVE ═══ */
    @media (max-width: 900px) {
      .masthead, .container, .tabs { padding-left: 20px; padding-right: 20px; }
      .summary-grid { grid-template-columns: 1fr 1fr; }
      .half-grid, .chart-duo, .lineup-cols, .grid-2 { grid-template-columns: 1fr; }
      .panel { padding: 28px 22px; }
      .detail-headline { font-size: 36px; }
      .feature-stat .fs-value { font-size: 84px; }
    }

    @media (max-width: 600px) {
      .masthead h1 { font-size: 48px; }
      .summary-grid { grid-template-columns: 1fr; }
      .cards-grid { grid-template-columns: 1fr; }
      .slate-row { grid-template-columns: 24px 80px 1fr 48px; gap: 8px; }
    }
  </style>
</head>
<body>

<main>

<header class="masthead">
  <div class="masthead-top">
    <span>Vol. I &middot; No. 1</span>
    <span>Markovian Inning Model</span>
    <span id="meta-issue">Loading&hellip;</span>
  </div>
  <h1><span class="the">The</span> NRFI <em><strong>Observer</strong></em></h1>
  <div class="masthead-sub">
    <span>Predictions</span>
    <span class="ornament">&#10022;</span>
    <span>Markov Chain Analysis</span>
    <span class="ornament">&#10022;</span>
    <span id="meta">Loading&hellip;</span>
  </div>
</header>

<nav class="tabs">
  <button class="tab-btn active" onclick="switchTab(0)">The Slate</button>
  <button class="tab-btn" onclick="switchTab(1)">Results Tracker</button>
  <button class="tab-btn" onclick="switchTab(2)">The Method</button>
</nav>

<div class="container">

  <!-- TAB 0: Predictions -->
  <div class="tab-content active" id="tab0">
    <div id="summaryArea"></div>
    <div id="slateArea"></div>
    <div class="cards-grid" id="grid">
      <div class="empty"><div class="spinner"></div><p style="margin-top:14px">Loading predictions&hellip;</p></div>
    </div>
  </div>

  <!-- TAB 1: Results Tracker -->
  <div class="tab-content" id="tab1">
    <div id="resultsTracker"><div class="empty"><div class="spinner"></div><p style="margin-top:14px">Loading results&hellip;</p></div></div>
  </div>

  <!-- TAB 2: Methodology -->
  <div class="tab-content" id="tab2">
    <div class="method-section" id="methodContent"></div>
  </div>

</div>

</main>

<div class="overlay" id="overlay" onclick="if(event.target===this)closeDetail()">
  <div class="panel">
    <button class="close" onclick="closeDetail()">&times;</button>
    <div id="detailContent"></div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════
// NRFI Observer — client-side rendering
// ══════════════════════════════════════════════════

let D = {};
let RL = {};

const pC = p => p>=.55?'prob-high':p>=.48?'prob-mid':p>=.40?'prob-low':'prob-vlow';
const pS = p => (p*100).toFixed(1);
const rnd = (n,d=1) => Number(n).toFixed(d);

// Chart.js defaults for editorial aesthetic
if (typeof Chart !== 'undefined') {
  Chart.defaults.font.family = "'IBM Plex Sans', sans-serif";
  Chart.defaults.font.size = 10;
  Chart.defaults.color = '#3a342a';
}

const INK = '#1a1814';
const MUTED = '#8a8476';
const ACCENT = '#c3392b';
const MOSS = '#6b7a3d';
const GOLD = '#b8941f';
const NAVY = '#2d3f5f';
const RULE = '#cfc3a9';
const PAPER_DARK = '#ebe1cf';

document.addEventListener('DOMContentLoaded', () => {
  fetch('data/latest.json').then(r=>r.json()).then(d => {
    D = d;
    const issueEl = document.getElementById('meta-issue');
    if (issueEl && d.date) {
      const [yr, mo, da] = d.date.split('-').map(Number);
      const dtObj = new Date(yr, mo - 1, da);  // local timezone
      issueEl.textContent = dtObj.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
    }
    document.getElementById('meta').textContent = `${d.summary?.n_games_modeled||0} games modeled \u00b7 ${(d.n_simulations||0).toLocaleString()} simulations`;
    renderSummary();
    loadResultsTracker();
    renderSlate();
    renderCards();
    renderMethodology();
  }).catch(() => {
    document.getElementById('grid').innerHTML = '<div class="empty"><h2>No issue available</h2><p>Run compute_daily.py to generate today\'s edition.</p></div>';
  });
});

function switchTab(n) {
  document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', i===n));
  document.querySelectorAll('.tab-content').forEach((c,i) => c.classList.toggle('active', i===n));
}

// ── Summary ──
function renderSummary() {
  const s = D.summary;
  if (!s || !s.n_games_modeled) return;
  document.getElementById('summaryArea').innerHTML = `
    <div class="summary-grid">
      <div class="stat-cell feature">
        <div class="stat-label">Mean P(NRFI)</div>
        <div class="stat-value tabular">${pS(s.mean_p_nrfi)}<span class="unit">%</span></div>
        <div class="stat-sub">&sigma; = ${pS(s.std_p_nrfi)}% &middot; ${s.n_games_modeled}/${s.n_games_total} games</div>
      </div>
      <div class="stat-cell">
        <div class="stat-label">Highest NRFI</div>
        <div class="stat-value tabular prob-high">${pS(s.best_nrfi.value)}<span class="unit">%</span></div>
        <div class="stat-sub">${s.best_nrfi.matchup}</div>
      </div>
      <div class="stat-cell">
        <div class="stat-label">Lowest NRFI</div>
        <div class="stat-value tabular prob-vlow">${pS(s.worst_nrfi.value)}<span class="unit">%</span></div>
        <div class="stat-sub">${s.worst_nrfi.matchup}</div>
      </div>
      <div class="stat-cell">
        <div class="stat-label">Sim \u2212 Analytic</div>
        <div class="stat-value tabular">${pS(s.mean_sim_analytic_gap)}<span class="unit">%</span></div>
        <div class="stat-sub">lineup order effect</div>
      </div>
    </div>`;
}

// ── Slate ──
function renderSlate() {
  const games = (D.games||[]).filter(g=>g.modeled).sort((a,b)=>b.results.p_nrfi_game-a.results.p_nrfi_game);
  if (!games.length) return;
  const maxP = Math.max(...games.map(g=>g.results.p_nrfi_game));
  document.getElementById('slateArea').innerHTML = `
    <div class="slate">
      <div class="section-head">The Full Slate</div>
      <div class="section-sub">Ranked by No-Run-First-Inning Probability</div>
      <div class="slate-list">
      ${games.map((g,i)=>{
        const p=g.results.p_nrfi_game;
        const w=Math.max(6, p/Math.max(maxP,.01)*100);
        const c=p>=.55?MOSS:p>=.48?GOLD:p>=.40?ACCENT:'#9a2a1e';
        const idx=D.games.indexOf(g);
        return `<div class="slate-row" onclick="openDetail(${idx})">
          <div class="slate-rank">${String(i+1).padStart(2,'0')}</div>
          <div class="slate-matchup">${g.away_team} <span class="at">at</span> ${g.home_team}</div>
          <div class="slate-bar"><div class="slate-bar-fill" style="width:${w}%;background:${c}"></div></div>
          <div class="slate-value ${pC(p)}">${pS(p)}%</div>
        </div>`;
      }).join('')}
      </div>
    </div>`;
}

// ── Game Cards ──
function renderCards() {
  const games = D.games||[];
  if (!games.length) { document.getElementById('grid').innerHTML='<div class="empty"><h2>No games</h2></div>'; return; }

  document.getElementById('grid').innerHTML = `
    <div style="grid-column:1/-1;background:var(--paper);padding:20px 24px 16px;">
      <div class="section-head">Today's Dispatches</div>
      <div class="section-sub">Click any card for the full analysis</div>
    </div>
  ` + games.map((g,idx)=>{
    const m=g.modeled, r=g.results;
    let badgeCls='badge-no', badgeText='No Data';
    if (m) {
      if (g.lineup_source==='projected') { badgeCls='badge-proj'; badgeText='Projected'; }
      else { badgeCls='badge-ok'; badgeText='Official'; }
    }
    const pill = m ? `<div class="card-nrfi tabular ${pC(r.p_nrfi_game)}">${pS(r.p_nrfi_game)}%</div>` : '<div class="card-nrfi none">—</div>';
    return `<div class="game-card ${m?'':'no-model'}" onclick="${m?`openDetail(${idx})`:''}">
      <div class="card-head">
        <span class="card-badge ${badgeCls}">${badgeText}</span>
        ${pill}
      </div>
      <div class="card-teams">${g.away_team}<span class="versus">vs</span>${g.home_team}</div>
      <div class="card-names">${g.away_name} at ${g.home_name}</div>
      <div class="card-pitchers">
        <div><span class="sp-label">AWAY SP &middot; </span>${g.away_pitcher.name}</div>
        <div><span class="sp-label">HOME SP &middot; </span>${g.home_pitcher.name}</div>
      </div>
      ${m?`<div class="card-halves">
        <div><span class="hv tabular ${pC(r.p_nrfi_away)}">${pS(r.p_nrfi_away)}%</span>Top 1st</div>
        <div><span class="hv tabular ${pC(r.p_nrfi_home)}">${pS(r.p_nrfi_home)}%</span>Bot 1st</div>
      </div>`:''}
    </div>`;
  }).join('');
}

// ── Game Detail ──
function openDetail(idx) {
  const g=D.games[idx]; if(!g||!g.modeled) return;
  const r=g.results, p=g.pitchers, pk=g.park, md=g.model_detail||{};
  document.getElementById('overlay').classList.add('open');
  const el=document.getElementById('detailContent');

  el.innerHTML=`
    <div class="detail-kicker">Feature Analysis &middot; ${g.lineup_source==='projected'?'Projected Lineups':'Official Lineups'}</div>
    <h2 class="detail-headline"><em>${g.away_team}</em> <strong>at</strong> <em>${g.home_team}</em></h2>
    <div class="detail-byline">${g.away_name} &middot; ${g.home_name}</div>

    <div class="feature-stat">
      <div class="fs-label">Probability of No Run in the First Inning</div>
      <div class="fs-value ${pC(r.p_nrfi_game)}">${pS(r.p_nrfi_game)}<span class="pct">%</span></div>
      <div class="fs-ci">95% CI [${pS(r.ci_lower)}%, ${pS(r.ci_upper)}%] &nbsp;\u00b7&nbsp; Analytic ${pS(r.p_nrfi_game_analytic)}%</div>
    </div>

    <div class="half-grid">
      <div class="half-panel">
        <div class="hp-label">Top 1st &middot; ${g.away_team} Batting</div>
        <div class="hp-value tabular ${pC(r.p_nrfi_away)}">${pS(r.p_nrfi_away)}%</div>
        <div class="hp-detail">vs <strong>${p.home.name}</strong> (${p.home.hand}HP)<br>
        <span class="mono">K ${pS(p.home.k_rate)}% &middot; HR ${pS(p.home.hr_rate)}% &middot; BB ${pS(p.home.bb_rate)}% &middot; E[PA] ${md.away_half?.expected_pa||r.avg_pa_away}</span></div>
      </div>
      <div class="half-panel">
        <div class="hp-label">Bot 1st &middot; ${g.home_team} Batting</div>
        <div class="hp-value tabular ${pC(r.p_nrfi_home)}">${pS(r.p_nrfi_home)}%</div>
        <div class="hp-detail">vs <strong>${p.away.name}</strong> (${p.away.hand}HP)<br>
        <span class="mono">K ${pS(p.away.k_rate)}% &middot; HR ${pS(p.away.hr_rate)}% &middot; BB ${pS(p.away.bb_rate)}% &middot; E[PA] ${md.home_half?.expected_pa||r.avg_pa_home}</span></div>
      </div>
    </div>

    <div class="detail-section">
      <div class="detail-section-label">Batter NRFI Impact</div>
      <div class="chart-duo">
        <div class="chart-box"><h4>${g.away_team} Lineup <span style="color:var(--muted);font-size:11px"> \u2014 vs ${p.home.name}</span></h4>${renderImpactBars(g.away_lineup)}</div>
        <div class="chart-box"><h4>${g.home_team} Lineup <span style="color:var(--muted);font-size:11px"> \u2014 vs ${p.away.name}</span></h4>${renderImpactBars(g.home_lineup)}</div>
      </div>
    </div>

function renderImpactBars(lineup) {
  if(!lineup||!lineup.length) return '';
  const maxAbs = Math.max(0.01, ...lineup.map(b=>Math.abs(b.nrfi_impact||0)));
  return lineup.map((b,i)=>{
    const v = b.nrfi_impact||0;
    const pct = Math.abs(v)/maxAbs*45;
    const col = v>=0 ? MOSS : ACCENT;
    const left = v>=0 ? 50 : 50 - pct;
    return `<div class="impact-bar">
      <div class="impact-name"><span class="sl">${i+1}.</span>${b.name}</div>
      <div class="impact-track"><div class="impact-center"></div><div class="impact-fill" style="left:${left}%;width:${pct}%;background:${col}"></div></div>
      <div class="impact-val" style="color:${col}">${v>=0?'+':''}${(v*100).toFixed(2)}%</div>
    </div>`;
  }).join('');
}

function renderLineupTable(lineup) {

}

function renderHeatmap(canvasId, tipId, half) {
  const canvas = document.getElementById(canvasId);
  const tip = document.getElementById(tipId);
  if (!canvas || !half.transition_matrix) return;

  const T = half.transition_matrix; // 24 × 26
  const labels = (half.state_labels || []).map(l => l.replace(' outs','o').replace(' out','o').replace(' & ','+').replace('empty','\u2205'));
  const colLabels = [...labels, 'NRFI', 'RUN'];

  const ctx = canvas.getContext('2d');
  const W = canvas.width;
  const H = canvas.height;
  const leftPad = 72;
  const topPad = 70;
  const cellW = (W - leftPad - 10) / 26;
  const cellH = (H - topPad - 10) / 24;

  ctx.clearRect(0, 0, W, H);
  ctx.imageSmoothingEnabled = false;

  // Color ramp: paper-dark -> red -> dark red
  const colorize = (v) => {
    const t = Math.min(1, Math.max(0, Math.pow(v, 0.6)));
    if (t < 0.01) return '#ebe1cf';
    // interpolate paper-dark (#ebe1cf) -> #e08a7c -> #c3392b -> #7a1f15
    const stops = [
      [235, 225, 207],
      [224, 138, 124],
      [195, 57, 43],
      [122, 31, 21],
    ];
    const pos = t * (stops.length - 1);
    const i = Math.floor(pos);
    const frac = pos - i;
    const a = stops[i];
    const b = stops[Math.min(i + 1, stops.length - 1)];
    const r = Math.round(a[0] + (b[0] - a[0]) * frac);
    const g = Math.round(a[1] + (b[1] - a[1]) * frac);
    const bl = Math.round(a[2] + (b[2] - a[2]) * frac);
    return `rgb(${r},${g},${bl})`;
  };

  // Draw cells
  for (let i = 0; i < 24; i++) {
    for (let j = 0; j < 26; j++) {
      const v = T[i][j] || 0;
      ctx.fillStyle = colorize(v);
      ctx.fillRect(leftPad + j * cellW, topPad + i * cellH, cellW - 0.5, cellH - 0.5);
    }
  }

  // Grid (thin hairlines)
  ctx.strokeStyle = 'rgba(26,24,20,0.08)';
  ctx.lineWidth = 0.5;
  for (let i = 0; i <= 24; i++) {
    ctx.beginPath();
    ctx.moveTo(leftPad, topPad + i * cellH);
    ctx.lineTo(leftPad + 26 * cellW, topPad + i * cellH);
    ctx.stroke();
  }
  for (let j = 0; j <= 26; j++) {
    ctx.beginPath();
    ctx.moveTo(leftPad + j * cellW, topPad);
    ctx.lineTo(leftPad + j * cellW, topPad + 24 * cellH);
    ctx.stroke();
  }

  // Highlight absorbing column boundary
  ctx.strokeStyle = '#1a1814';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(leftPad + 24 * cellW, topPad);
  ctx.lineTo(leftPad + 24 * cellW, topPad + 24 * cellH);
  ctx.stroke();

  // Row labels (current state)
  ctx.fillStyle = '#3a342a';
  ctx.font = "9px 'JetBrains Mono', monospace";
  ctx.textAlign = 'right';
  ctx.textBaseline = 'middle';
  for (let i = 0; i < 24; i++) {
    ctx.fillText(labels[i] || `S${i}`, leftPad - 6, topPad + i * cellH + cellH / 2);
  }

  // Column labels (next state) - rotated
  ctx.save();
  ctx.textAlign = 'left';
  ctx.textBaseline = 'middle';
  for (let j = 0; j < 26; j++) {
    const x = leftPad + j * cellW + cellW / 2;
    ctx.save();
    ctx.translate(x, topPad - 6);
    ctx.rotate(-Math.PI / 4);
    ctx.fillStyle = (j >= 24) ? '#c3392b' : '#3a342a';
    ctx.font = (j >= 24) ? "bold 9px 'JetBrains Mono', monospace" : "9px 'JetBrains Mono', monospace";
    ctx.fillText(colLabels[j] || `S${j}`, 0, 0);
    ctx.restore();
  }
  ctx.restore();

  // Axis labels
  ctx.fillStyle = '#8a8476';
  ctx.font = "italic 10px 'Fraunces', serif";
  ctx.textAlign = 'center';
  ctx.fillText('next state', leftPad + 13 * cellW, 12);
  ctx.save();
  ctx.translate(14, topPad + 12 * cellH);
  ctx.rotate(-Math.PI / 2);
  ctx.fillText('current state', 0, 0);
  ctx.restore();

  // Hover tooltip
  canvas.onmousemove = (e) => {
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    const x = (e.clientX - rect.left) * scaleX;
    const y = (e.clientY - rect.top) * scaleY;
    const col = Math.floor((x - leftPad) / cellW);
    const row = Math.floor((y - topPad) / cellH);
    if (row >= 0 && row < 24 && col >= 0 && col < 26) {
      const v = T[row][col] || 0;
      const curLbl = (half.state_labels || [])[row] || `S${row}`;
      const nextLbl = col < 24 ? (half.state_labels || [])[col] || `S${col}` : (col === 24 ? 'NRFI absorbed' : 'Run absorbed');
      tip.textContent = `${curLbl} → ${nextLbl}   P = ${(v * 100).toFixed(2)}%`;
      tip.classList.add('show');
      tip.style.left = (e.clientX - rect.left + 12) + 'px';
      tip.style.top = (e.clientY - rect.top + 12) + 'px';
    } else {
      tip.classList.remove('show');
    }
  };
  canvas.onmouseleave = () => tip.classList.remove('show');
}

function parseBaseOuts(stateIdx) {
  if (stateIdx === 24) return { bases: 0, outs: 3 };
  if (stateIdx === 25) return { bases: 0, outs: 0, run: true };
  if (stateIdx < 0 || stateIdx > 23) return { bases: 0, outs: 0 };
  return { bases: Math.floor(stateIdx / 3), outs: stateIdx % 3 };
}

function updateDiamond(bases, outs, isRun, isNrfi) {
  const r1 = document.getElementById('r1B');
  const r2 = document.getElementById('r2B');
  const r3 = document.getElementById('r3B');
  const rH = document.getElementById('rHome');
  const b1 = document.getElementById('d1B');
  const b2 = document.getElementById('d2B');
  const b3 = document.getElementById('d3B');

  if (r1) r1.setAttribute('opacity', (bases & 1) ? '1' : '0');
  if (r2) r2.setAttribute('opacity', (bases & 2) ? '1' : '0');
  if (r3) r3.setAttribute('opacity', (bases & 4) ? '1' : '0');

  if (b1) b1.setAttribute('fill', (bases & 1) ? '#c3392b' : '#f4ede1');
  if (b2) b2.setAttribute('fill', (bases & 2) ? '#c3392b' : '#f4ede1');
  if (b3) b3.setAttribute('fill', (bases & 4) ? '#c3392b' : '#f4ede1');

  for (let i = 0; i < 3; i++) {
    const dot = document.getElementById(`out${i}`);
    if (dot) dot.classList.toggle('filled', i < outs);
  }

  const runText = document.getElementById('dRunText');
  const nrfiText = document.getElementById('dNrfiText');
  if (runText) runText.setAttribute('opacity', isRun ? '1' : '0');
  if (nrfiText) nrfiText.setAttribute('opacity', isNrfi ? '1' : '0');

  if (rH && !isRun && !isNrfi) {
    rH.setAttribute('opacity', '0.55');
    setTimeout(() => rH.setAttribute('opacity', '0'), 280);
  }
}

function renderTraceButtons() {
  const container = document.getElementById('traceContainer');
  const traces = window._currentTraces || [];
  if (!traces.length) { container.innerHTML = '<span style="color:var(--muted);font-size:11px;font-style:italic">No trace data available</span>'; return; }
  container.innerHTML = traces.map((t, i) => {
    const cls = t.nrfi ? 'nrfi-trace' : 'rfi-trace';
    const label = t.nrfi ? 'NRFI' : 'RFI';
    const totalPA = t.top.pa + t.bottom.pa;
    return `<button class="trace-btn ${cls}" onclick="playTrace(${i})">${String(i+1).padStart(2,'0')} &middot; ${label} &middot; ${totalPA}PA</button>`;
  }).join('');
}

let _traceTimer = null;

function playTrace(idx) {
  const traces = window._currentTraces || [];
  const t = traces[idx];
  if (!t) return;

  document.querySelectorAll('.trace-btn').forEach((b, i) => b.classList.toggle('active', i === idx));
  if (_traceTimer) { clearInterval(_traceTimer); _traceTimer = null; }

  const totalPA = t.top.pa + t.bottom.pa;
  const replay = document.getElementById('traceReplay');
  replay.innerHTML = `
    <div class="diamond-wrap">
      ${buildDiamondSVG()}
      <div class="diamond-info">
        <div id="dHalfLabel" style="font-family:var(--serif);font-style:italic;font-size:18px;font-weight:500">Top 1st &mdash; ${t.away_team}</div>
        <div class="diamond-outs">
          <span>Outs</span>
          <div class="out-dot" id="out0"></div>
          <div class="out-dot" id="out1"></div>
          <div class="out-dot" id="out2"></div>
        </div>
        <div class="diamond-pa" id="dPaLabel">PA: <strong>0</strong> / ${totalPA}</div>
        <div class="diamond-event" id="dEvent">Top of the 1st begins&hellip;</div>
        <div class="diamond-result" id="dResult"></div>
        <div id="dLog"></div>
      </div>
    </div>
  `;

  const timeline = [];
  t.top.trace.forEach((s, i) => { timeline.push({ ...s, half: 'top', paNum: i }); });
  timeline.push({ state: -99, label: 'TRANSITION', half: 'transition' });
  t.bottom.trace.forEach((s, i) => { timeline.push({ ...s, half: 'bottom', paNum: i }); });
  timeline.push({ state: -100, label: t.nrfi ? 'GAME NRFI' : 'GAME RFI', half: 'final', nrfi: t.nrfi });

  let step = 0;
  let logLines = [];
  let cumulativePA = 0;

  _traceTimer = setInterval(() => {
    if (step >= timeline.length) {
      clearInterval(_traceTimer);
      _traceTimer = null;
      return;
    }

    const s = timeline[step];
    const halfLabel = document.getElementById('dHalfLabel');
    const eventEl = document.getElementById('dEvent');
    const paLabel = document.getElementById('dPaLabel');
    const resultEl = document.getElementById('dResult');
    const logEl = document.getElementById('dLog');
    const runText = document.getElementById('dRunText');
    const nrfiText = document.getElementById('dNrfiText');

    if (s.half === 'transition') {
      updateDiamond(0, 0, false, false);
      if (halfLabel) halfLabel.innerHTML = `Bot 1st &mdash; ${t.home_team}`;
      if (eventEl) eventEl.textContent = 'Bottom of the 1st begins…';
      logLines.push('<span style="color:var(--accent);font-weight:700;font-family:var(--sans)">\u2014 Bottom of 1st \u2014</span>');
      if (runText) runText.setAttribute('opacity', '0');
      if (nrfiText) nrfiText.setAttribute('opacity', '0');
      if (resultEl) { resultEl.classList.remove('show'); resultEl.textContent = ''; }
    } else if (s.half === 'final') {
      if (resultEl) {
        resultEl.textContent = s.nrfi ? 'NRFI' : 'RUN SCORED';
        resultEl.style.color = s.nrfi ? MOSS : ACCENT;
        resultEl.classList.add('show');
      }
      logLines.push(`<span style="color:${s.nrfi?MOSS:ACCENT};font-weight:700;font-family:var(--sans);font-size:11px">${s.nrfi ? 'NRFI \u2014 no run in the 1st' : 'RFI \u2014 run scored in the 1st'}</span>`);
    } else {
      const isRun = s.state === 25;
      const isNrfi = s.state === 24;
      const parsed = parseBaseOuts(s.state);
      const batter = s.batter;
      const verb = s.event;
      const outcome = s.outcome;

      // Build pretty event line for the event display
      const buildEventHtml = (batter, verb, outcome) => {
        if (!batter || !verb) return '';
        const outcomeTag = outcome ? `<span style="font-family:var(--mono);font-size:9px;color:var(--muted);margin-left:6px;letter-spacing:.1em">[${outcome}]</span>` : '';
        return `<div style="font-size:11px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin-bottom:2px">PA ${cumulativePA + (isRun || isNrfi ? 0 : 1)}${outcomeTag}</div><div><strong>${batter}</strong> ${verb}</div>`;
      };

      if (isRun || isNrfi) {
        updateDiamond(0, isNrfi ? 3 : 0, isRun, isNrfi);
        cumulativePA++;
        const verdictText = isNrfi ? (batter ? `${batter} ${verb} &mdash; side retired` : 'Side retired') : (batter ? `${batter} ${verb} &mdash; run scored!` : 'Run scored!');
        if (eventEl) eventEl.innerHTML = buildEventHtml(batter, verb + (isNrfi ? ' — side retired' : ' — run scored!'), s.detail);
        // Log entry
        const logLine = batter
          ? `<span style="color:${isNrfi?MOSS:ACCENT};font-weight:700">${batter}</span> ${verb}<span style="color:${isNrfi?MOSS:ACCENT};font-weight:700"> \u2014 ${isNrfi?'3 outs':'RUN'}</span>`
          : `<span style="color:${isNrfi?MOSS:ACCENT};font-weight:700">${isNrfi?'Side retired':'Run scored!'}</span>`;
        logLines.push(logLine);
      } else {
        updateDiamond(parsed.bases, parsed.outs, false, false);
        if (s.paNum > 0 || batter) {
          cumulativePA++;
          const logLine = batter
            ? `<span style="color:var(--ink);font-weight:600">${batter}</span> ${verb} <span style="color:var(--muted)">&rarr; ${s.label}</span>`
            : s.label;
          logLines.push(logLine);
        }
        if (eventEl) {
          if (batter) {
            eventEl.innerHTML = buildEventHtml(batter, verb, s.detail);
          } else {
            eventEl.textContent = s.label;
          }
        }
      }

      if (paLabel) paLabel.innerHTML = `PA: <strong>${cumulativePA}</strong> / ${totalPA}`;
    }

    if (logEl) {
      logEl.innerHTML = logLines.join('<br>');
      logEl.scrollTop = logEl.scrollHeight;
    }

    step++;
  }, 650);
}

function closeDetail() {
  if (_traceTimer) { clearInterval(_traceTimer); _traceTimer = null; }
  document.getElementById('overlay').classList.remove('open');
}

function buildStateDiagram() {
  const svg = document.getElementById('stateDiagram');
  if (!svg) return;

  const baseLabels = ['empty','1B','2B','1+2','3B','1+3','2+3','Loaded'];
  const colors = {0: '#cfd8e6', 1: '#f1d98a', 2: '#e8a598'};
  const strokes = {0: '#5a6b88', 1: '#a8852f', 2: '#a05548'};

  // Layout: 8 columns (base configs) × 3 rows (outs)
  const colW = 76;
  const rowH = 90;
  const xOff = 50;
  const yOff = 50;
  const cellW = 64;
  const cellH = 56;

  // Compute positions for each state index
  const positions = {};
  for (let bi = 0; bi < 8; bi++) {
    for (let o = 0; o < 3; o++) {
      const idx = bi * 3 + o;
      positions[idx] = {
        x: xOff + bi * colW,
        y: yOff + o * rowH,
        cx: xOff + bi * colW + cellW / 2,
        cy: yOff + o * rowH + cellH / 2,
      };
    }
  }
  // Absorbing states off to the side
  const nrfiPos = { cx: xOff + 8 * colW + 8, cy: yOff + cellH / 2, x: xOff + 8 * colW, y: yOff };
  const rfiPos = { cx: xOff + 8 * colW + 8, cy: yOff + 2 * rowH + cellH / 2, x: xOff + 8 * colW, y: yOff + 2 * rowH };

  let svgContent = '';

  // Defs: arrowhead
  svgContent += `<defs>
    <marker id="arrowhead" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <polygon points="0 0, 6 3, 0 6" fill="#1a1814" opacity="0.6"/>
    </marker>
    <marker id="arrowheadRed" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <polygon points="0 0, 6 3, 0 6" fill="#c3392b"/>
    </marker>
  </defs>`;

  // Column headers (base configs)
  for (let bi = 0; bi < 8; bi++) {
    svgContent += `<text x="${xOff + bi * colW + cellW / 2}" y="32" text-anchor="middle" font-family="JetBrains Mono" font-size="9" font-weight="700" fill="#3a342a" letter-spacing="0.05em">${baseLabels[bi].toUpperCase()}</text>`;
  }
  // Row labels (outs)
  for (let o = 0; o < 3; o++) {
    svgContent += `<text x="${xOff - 12}" y="${yOff + o * rowH + cellH / 2 + 4}" text-anchor="end" font-family="Fraunces" font-style="italic" font-size="13" fill="#3a342a">${o} out${o !== 1 ? 's' : ''}</text>`;
  }

  // From each state at the START state (index 0 = empty, 0 outs), highlight outgoing arcs.
  // We don't have lineup data here — show illustrative outgoing transitions for ALL states.
  // Use a simple deterministic outgoing edge set: each state advances by either +1 out or by adding a runner.
  // For visual clarity, draw arcs from "empty, 0 outs" (index 0) to its most likely successors.

  // Hand-defined "interesting transitions" demonstrating model flow
  const flows = [
    { from: 0, to: 1, label: 'K' },        // empty 0o -> empty 1o
    { from: 0, to: 3, label: '1B' },       // empty 0o -> 1B 0o
    { from: 0, to: 'rfi', label: 'HR' },   // empty 0o -> RUN
    { from: 1, to: 2, label: 'K' },        // empty 1o -> empty 2o
    { from: 1, to: 4, label: '1B' },       // empty 1o -> 1B 1o
    { from: 2, to: 'nrfi', label: 'K' },   // empty 2o -> NRFI
    { from: 3, to: 4, label: 'K' },        // 1B 0o -> empty/1B 1o (simplified)
    { from: 3, to: 9, label: '1B' },       // 1B 0o -> 1B+2B 0o
    { from: 3, to: 'rfi', label: 'HR' },
    { from: 9, to: 'rfi', label: '2B' },
  ];

  flows.forEach(f => {
    const a = positions[f.from];
    let b;
    if (f.to === 'nrfi') b = nrfiPos;
    else if (f.to === 'rfi') b = rfiPos;
    else b = positions[f.to];
    if (!a || !b) return;

    // Curved path from a.cx,a.cy to b.cx,b.cy
    const dx = b.cx - a.cx;
    const dy = b.cy - a.cy;
    const mx = (a.cx + b.cx) / 2;
    const my = (a.cy + b.cy) / 2 - Math.abs(dx) * 0.15;
    const isAbsorb = (f.to === 'nrfi' || f.to === 'rfi');
    const stroke = isAbsorb ? '#c3392b' : '#1a1814';
    const opacity = isAbsorb ? 0.7 : 0.35;
    const marker = isAbsorb ? 'arrowheadRed' : 'arrowhead';

    svgContent += `<path d="M ${a.cx + cellW/2 - 4} ${a.cy} Q ${mx} ${my} ${b.cx - cellW/2 + 6} ${b.cy}" stroke="${stroke}" stroke-width="1.2" fill="none" opacity="${opacity}" marker-end="url(#${marker})"/>`;
    // Edge label
    svgContent += `<text x="${mx}" y="${my - 2}" text-anchor="middle" font-family="JetBrains Mono" font-size="8" font-weight="700" fill="${stroke}" opacity="${opacity + 0.2}">${f.label}</text>`;
  });

  // State nodes
  for (let bi = 0; bi < 8; bi++) {
    for (let o = 0; o < 3; o++) {
      const idx = bi * 3 + o;
      const p = positions[idx];
      const fill = colors[o];
      const stroke = strokes[o];
      svgContent += `<g class="state-node">
        <rect x="${p.x}" y="${p.y}" width="${cellW}" height="${cellH}" fill="${fill}" stroke="${stroke}" stroke-width="1.2"/>
        <text class="sid" x="${p.cx}" y="${p.cy - 4}" text-anchor="middle">${idx}</text>
        <text class="slbl" x="${p.cx}" y="${p.cy + 12}" text-anchor="middle">${baseLabels[bi]}, ${o}o</text>
      </g>`;
    }
  }

  // Absorbing states
  svgContent += `<g class="state-node">
    <rect x="${nrfiPos.x}" y="${nrfiPos.y}" width="80" height="${cellH}" fill="#9fb377" stroke="#586333" stroke-width="1.5"/>
    <text x="${nrfiPos.x + 40}" y="${nrfiPos.cy - 2}" text-anchor="middle" font-family="Fraunces" font-style="italic" font-weight="700" font-size="14" fill="#1a1814">NRFI</text>
    <text x="${nrfiPos.x + 40}" y="${nrfiPos.cy + 13}" text-anchor="middle" font-family="JetBrains Mono" font-size="7" fill="#3a342a">3 outs, 0 R</text>
  </g>`;
  svgContent += `<g class="state-node">
    <rect x="${rfiPos.x}" y="${rfiPos.y}" width="80" height="${cellH}" fill="#c3392b" stroke="#7a1f15" stroke-width="1.5"/>
    <text x="${rfiPos.x + 40}" y="${rfiPos.cy - 2}" text-anchor="middle" font-family="Fraunces" font-style="italic" font-weight="700" font-size="14" fill="#f4ede1">RFI</text>
    <text x="${rfiPos.x + 40}" y="${rfiPos.cy + 13}" text-anchor="middle" font-family="JetBrains Mono" font-size="7" fill="#f4ede1">run scored</text>
  </g>`;

  svg.innerHTML = svgContent;
}

    <div class="state-diagram-wrap">
      <svg id="stateDiagram" viewBox="0 0 720 360" xmlns="http://www.w3.org/2000/svg"></svg>
      <div class="state-diagram-legend">

        <div><span class="ld outs-1"></span>1 out</div>
        <div><span class="ld outs-2"></span>2 outs</div>
        <div><span class="ld absorb-nrfi"></span>NRFI</div>
        <div><span class="ld absorb-rfi"></span>Run scored</div>
        <div style="margin-left:auto;font-style:italic;color:var(--muted)">arcs show top-3 outgoing transitions from each state</div>
      </div>
    </div>

    <h2>Transition Probabilities</h2>
    <p>For each plate appearance, the outcome distribution is a blend of pitcher and batter statistics using the <strong>log-odds (odds-ratio) method</strong>:</p>
    <div class="formula" id="blendFormula"></div>
    <p>This produces a probability for each of eleven mutually exclusive PA outcomes: strikeout, walk, hit by pitch, home run, single, double, triple, ground ball out, fly ball out, line drive out, and fielder's choice. Each outcome maps deterministically to a next state via standard baseball advancement rules, with conditional branching for double plays and sacrifice flies.</p>

    <h2>Park and Platoon Adjustments</h2>
    <p>After blending, home run rates are scaled by a park-specific factor, ranging from 0.82 (Miami) to 1.25 (Coors Field). Hit rates receive a smaller run-environment adjustment. Platoon multipliers further adjust K%, BB%, and HR% based on the pitcher-hand and batter-hand matchup.</p>

    <h2>Two Computation Paths</h2>
    <div class="grid-2">
      <div>
        <h3>Analytic</h3>
        <p>Extract the 24&times;24 transient sub-matrix <strong>Q</strong> and compute the fundamental matrix <strong>N = (I &minus; Q)<sup>&minus;1</sup></strong>. The absorption probability vector <strong>B = N &middot; R</strong> yields P(NRFI) directly, under a lineup-averaged approximation.</p>
      </div>
      <div>
        <h3>Monte Carlo</h3>
        <p>Simulate fifty thousand first innings with proper batting-order sequencing. Each plate appearance draws from the current batter's outcome distribution and transitions the chain. The gap between both methods quantifies the batting order effect.</p>
      </div>
    </div>

    <h2>Player Profiles</h2>
    <p>Each player's rates are constructed from <strong>three years of MLB data (2024&ndash;2026)</strong>, aggregated from counting statistics via the official MLB Stats API. The weighted merge uses plate-appearance counts&mdash;a batter with 800 prior PA and 50 recent PA receives proportional blending&mdash;preventing early-season noise from overwhelming established priors.</p>
  `;

  // Build the state diagram SVG
  buildStateDiagram();

  const formulaEl = document.getElementById('blendFormula');
  try {
    katex.render('\\text{logit}(p_{\\text{blend}}) = \\text{logit}(p_{\\text{pitcher}}) + \\text{logit}(p_{\\text{batter}}) - \\text{logit}(p_{\\text{league}})', formulaEl, { displayMode: true });
  } catch(e) {
    formulaEl.textContent = 'logit(p_blend) = logit(p_pitcher) + logit(p_batter) − logit(p_league)';

let HS = null;  // historical stats

function loadResultsTracker() {
  Promise.all([
    fetch('data/results_log.json').then(r => r.json()).catch(() => null),
    fetch('data/historical_stats.json').then(r => r.json()).catch(() => null),
  ]).then(([rl, hs]) => {

function mergeResults(rl, hs) {
  // Merge live entries (results_log.json) with historical entries (historical_stats.json).
  // Live takes precedence on duplicates. Recompute cumulative + daily from the union.
  const liveEntries = (rl && rl.entries) || [];
  const histEntries = (hs && hs.entries) || [];

  const seen = new Set(liveEntries.map(e => e.game_id));
  const merged = [...liveEntries, ...histEntries.filter(e => !seen.has(e.game_id))];

  if (!merged.length) {
    return { entries: [], cumulative: {}, daily: [] };
  }

  // Sort by date ascending
  merged.sort((a, b) => (a.date < b.date ? -1 : a.date > b.date ? 1 : 0));

  // Cumulative stats
  const n = merged.length;
  const yTrue = merged.map(e => e.nrfi_actual ? 1 : 0);
  const yPred = merged.map(e => e.p_nrfi_predicted);
  const correctCount = merged.filter(e => e.correct).length;

  const actualRate = yTrue.reduce((a, b) => a + b, 0) / n;
  const meanPred = yPred.reduce((a, b) => a + b, 0) / n;
  const brier = yPred.reduce((acc, p, i) => acc + (p - yTrue[i]) ** 2, 0) / n;
  const brierNaive = yTrue.reduce((acc, y) => acc + (actualRate - y) ** 2, 0) / n;
  const bss = brierNaive > 0 ? 1 - brier / brierNaive : 0;
  const eps = 1e-7;
  const logLoss = -yPred.reduce((acc, p, i) => {
    const pc = Math.min(1 - eps, Math.max(eps, p));
    return acc + yTrue[i] * Math.log(pc) + (1 - yTrue[i]) * Math.log(1 - pc);
  }, 0) / n;
  const accuracy = correctCount / n;

  // Daily breakdown
  const byDate = {};
  for (const e of merged) {
    if (!byDate[e.date]) byDate[e.date] = { date: e.date, n_games: 0, correct: 0, nrfi_count: 0 };
    byDate[e.date].n_games++;
    if (e.correct) byDate[e.date].correct++;
    if (e.nrfi_actual) byDate[e.date].nrfi_count++;
  }
  const daily = Object.values(byDate).sort((a, b) => a.date.localeCompare(b.date));
  for (const d of daily) d.accuracy = d.correct / d.n_games;

  return {
    entries: merged,
    cumulative: {
      n_games: n,
      accuracy: accuracy,
      brier_score: brier,
      brier_skill_score: bss,
      log_loss: logLoss,
      actual_nrfi_rate: actualRate,
      mean_predicted: meanPred,
    },
    daily,
  };
}

function computeCalibrationFromEntries(entries) {
  // Calibration bins: 5pp buckets from 30% to 70%
  const edges = [];
  for (let v = 0.30; v < 0.70; v += 0.05) edges.push(Math.round(v * 100) / 100);
  edges.push(0.70);

  const cal = [];
  for (let i = 0; i < edges.length - 1; i++) {
    const lo = edges[i], hi = edges[i + 1];
    const inBin = entries.filter(e => e.p_nrfi_predicted >= lo && e.p_nrfi_predicted < hi);
    if (inBin.length < 3) continue;
    const meanPred = inBin.reduce((a, e) => a + e.p_nrfi_predicted, 0) / inBin.length;
    const meanActual = inBin.filter(e => e.nrfi_actual).length / inBin.length;
    cal.push({
      bin: `${(lo*100).toFixed(0)}%–${(hi*100).toFixed(0)}%`,
      lo, hi,
      n: inBin.length,
      predicted: meanPred,
      actual: meanActual,
    });
  }
  return cal;
}

function computeTiersFromEntries(entries) {
  const tierDefs = [
    ["Strong NRFI (>58%)",   e => e.p_nrfi_predicted >= 0.58],
    ["Lean NRFI (52–58%)",   e => e.p_nrfi_predicted >= 0.52 && e.p_nrfi_predicted < 0.58],
    ["Coin Flip (48–52%)",   e => e.p_nrfi_predicted >= 0.48 && e.p_nrfi_predicted < 0.52],
    ["Lean RFI (42–48%)",    e => e.p_nrfi_predicted >= 0.42 && e.p_nrfi_predicted < 0.48],
    ["Strong RFI (<42%)",    e => e.p_nrfi_predicted < 0.42],
  ];
  const out = [];
  for (const [name, fn] of tierDefs) {
    const sub = entries.filter(fn);
    if (!sub.length) continue;
    const meanPred = sub.reduce((a, e) => a + e.p_nrfi_predicted, 0) / sub.length;
    const actualRate = sub.filter(e => e.nrfi_actual).length / sub.length;
    const acc = sub.filter(e => e.correct).length / sub.length;
    out.push({
      tier: name,
      n: sub.length,
      predicted: meanPred,
      actual_nrfi_rate: actualRate,
      accuracy: acc,
    });
  }
  return out;
}

  const entries = (RL && RL.entries) || [];
  if (!entries.length) return '';

  const cal = computeCalibrationFromEntries(entries);

  window._calData = cal;

  return `

          grid: { color: 'rgba(207,195,169,0.5)' },
          ticks: { color: '#8a8476', font: { size: 10, family: 'JetBrains Mono' }, callback: v => v + '%' }
        }
      }
    }
  });
}

function renderResultsTracker() {
  const el = document.getElementById('resultsTracker');
  const c = RL.cumulative || {};
  const entries = RL.entries || [];
  const daily = RL.daily || [];

  if (!entries.length) {
    if (HS && HS.n_games) {
      el.innerHTML = renderHistoricalSection();
      setTimeout(() => renderCalibrationChart(), 100);
    } else {
      el.innerHTML = '<div class="empty"><h2>No results yet</h2><p>Results will populate as games resolve their first innings.</p></div>';
    }
    return;
  }

  const correctCount = Math.round(c.accuracy * c.n_games);

  el.innerHTML = `
    <div class="section-head">Running Performance</div>
    <div class="section-sub">Tracked across ${c.n_games} resolved games</div>

    <div class="results-grid">
      <div class="stat-cell feature">
        <div class="stat-label">Accuracy</div>
        <div class="stat-value tabular ${c.accuracy>=.55?'prob-high':c.accuracy>=.48?'prob-mid':'prob-low'}">${(c.accuracy*100).toFixed(1)}<span class="unit">%</span></div>
        <div class="stat-sub">${correctCount} / ${c.n_games} correct</div>
      </div>
      <div class="stat-cell">
        <div class="stat-label">Brier Score</div>
        <div class="stat-value tabular">${c.brier_score?.toFixed(4) || '—'}</div>
        <div class="stat-sub">lower is better</div>
      </div>
      <div class="stat-cell">
        <div class="stat-label">Log Loss</div>
        <div class="stat-value tabular">${c.log_loss?.toFixed(4) || '—'}</div>
        <div class="stat-sub">cross-entropy</div>
      </div>
      <div class="stat-cell">
        <div class="stat-label">Actual Rate</div>
        <div class="stat-value tabular">${pS(c.actual_nrfi_rate||0)}<span class="unit">%</span></div>
        <div class="stat-sub">NRFI observed</div>
      </div>
    </div>

    <div class="tracker-section">
      <h3>Daily Breakdown</h3>
      <div style="background:var(--paper);border:1px solid var(--rule);padding:16px 20px;margin-bottom:20px"><canvas id="dailyChart" height="200"></canvas></div>
      <table class="daily-table">
        <thead><tr><th>Date</th><th>Games</th><th>Correct</th><th>Accuracy</th><th>NRFI Count</th><th>NRFI Rate</th></tr></thead>
        <tbody>
        ${daily.slice().reverse().map(d => `
          <tr>
            <td>${d.date}</td>
            <td class="tabular">${d.n_games}</td>
            <td class="tabular">${d.correct} / ${d.n_games}</td>
            <td class="pct-val ${d.accuracy>=.55?'prob-high':d.accuracy>=.45?'prob-mid':'prob-low'}">${(d.accuracy*100).toFixed(0)}%</td>
            <td class="tabular">${d.nrfi_count} / ${d.n_games}</td>
            <td class="tabular">${(d.nrfi_count/d.n_games*100).toFixed(0)}%</td>
          </tr>
        `).join('')}
        </tbody>
      </table>
    </div>

    <div class="tracker-section">
      <details class="ledger-details">
        <summary><h3 style="display:inline">Ledger of Predictions <span style="color:var(--muted);font-weight:400;text-transform:none;letter-spacing:0;font-family:var(--serif);font-style:italic;font-size:13px"> \u2014 ${entries.length} games (click to expand)</span></h3></summary>
        <table class="daily-table" style="margin-top:14px">
          <thead><tr><th>Date</th><th>Matchup</th><th>Predicted</th><th>Outcome</th><th>1st Inning</th><th>Verdict</th></tr></thead>
          <tbody>
          ${entries.slice().reverse().map(e => `
            <tr>
              <td style="color:var(--muted)">${e.date}</td>
              <td class="matchup">${e.away_team} <span style="color:var(--muted);font-style:italic;font-weight:300">at</span> ${e.home_team}</td>
              <td class="pct-val ${pC(e.p_nrfi_predicted)}">${pS(e.p_nrfi_predicted)}%</td>
              <td>${e.nrfi_actual ? '<span class="nrfi-tag">NRFI</span>' : '<span class="rfi-tag">RFI</span>'}</td>
              <td class="tabular" style="color:var(--muted)">${e.nrfi_actual ? '0–0' : e.away_runs_1st+'–'+e.home_runs_1st}</td>
              <td>${e.correct ? '<span class="correct-tag">correct</span>' : '<span class="miss-tag">miss</span>'}</td>
            </tr>
          `).join('')}
          </tbody>
        </table>
      </details>
    </div>

    ${renderHistoricalSection()}
  `;

  setTimeout(() => renderCalibrationChart(), 100);

  setTimeout(() => {
    if (!daily.length) return;
    const ctx = document.getElementById('dailyChart');
    if (!ctx) return;
    new Chart(ctx, {
      type: 'bar',
      data: {
        labels: daily.map(d => d.date),
        datasets: [
          {
            label: 'Accuracy',
            data: daily.map(d => d.accuracy * 100),
            backgroundColor: daily.map(d => d.accuracy >= .55 ? MOSS : d.accuracy >= .45 ? GOLD : ACCENT),
            borderRadius: 0,
            borderWidth: 0,
            yAxisID: 'y',
          },
          {
            label: 'NRFI Rate',
            data: daily.map(d => (d.nrfi_count / d.n_games) * 100),
            type: 'line',
            borderColor: INK,
            backgroundColor: 'rgba(26,24,20,0.05)',
            pointRadius: 4,
            pointBackgroundColor: INK,
            pointBorderColor: '#f4ede1',
            pointBorderWidth: 2,
            borderWidth: 2,
            tension: 0.25,
            yAxisID: 'y',
          }
        ]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { labels: { color: '#3a342a', font: { size: 10, family: 'IBM Plex Sans' } }, position: 'bottom' },
          tooltip: { callbacks: { label: ctx => `${ctx.dataset.label}: ${ctx.raw.toFixed(1)}%` } }
        },
        scales: {
          y: { min: 0, max: 100, grid: { color: 'rgba(207,195,169,0.5)' }, ticks: { color: '#8a8476', font: { size: 10, family: 'JetBrains Mono' }, callback: v => v + '%' } },
          x: { grid: { display: false }, ticks: { color: '#8a8476', font: { size: 10, family: 'JetBrains Mono' }, maxRotation: 45 } }
        }
      }
    });
  }, 50);
}
</script>

</body>
</html>
