name: NRFI Predictions

on:
  schedule:
    - cron: '0 * * * *'  # every hour
  workflow_dispatch:

jobs:
  compute:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install numpy pandas scipy requests

      # Only update profiles twice a day (13:00 and 20:00 UTC)
      - name: Update player profiles
        if: contains(fromJSON('["13","20"]'), github.event.schedule && format('{0}', github.event.schedule) || '13')
        run: python update_profiles.py
        continue-on-error: true

      - name: Compute today's predictions
        run: python compute_daily.py

      - name: Check resolved game results
        run: python check_results.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/ data/pitchers.csv data/batters.csv data/league_averages.csv
          git diff --staged --quiet || git commit -m "Update $(date +%Y-%m-%d\ %H:%M\ UTC)"
          git push
